# Example configuration for dashboard-llm.
# Recommended: use /admin/config web UI instead of editing manually.
# See scripts/GUIDE.md for full documentation.

server:
  host: "0.0.0.0"
  port: 5001
  debug: false

monitoring:
  refresh_interval_ms: 1000
  log_lines: 50
  log_block_bytes: 8192

# Each service is defined here with ALL its attributes.
# Use the /admin/config page to add/edit/delete services via web UI.
services:
  # Always-on service — not in LLM Engine dropdown
  ollama:
    name: "Ollama"
    backend: "ollama"
    role: "llm"
    exclusive_group: ~
    base_url: "http://127.0.0.1:11434"
    health_endpoint: "/"
    timeout_seconds: 2
    log_type: "journalctl"
    journalctl_unit: "ollama"
    systemd_unit: "ollama.service"
    start_command: ["systemctl", "start", "ollama.service"]
    stop_command: ["systemctl", "stop", "ollama.service"]
    process_patterns: ["ollama"]
    startup_time_seconds: 5
    log_filter: default

  # LLM Engine — dedicated port, systemd-managed
  vllm_my_model:
    name: "MyModel FP8 (vLLM)"
    backend: "vllm"
    role: "llm"
    exclusive_group: ~          # dedicated port — not shared
    base_url: "http://127.0.0.1:8002"
    health_endpoint: "/health"
    models_endpoint: "/v1/models"
    timeout_seconds: 2
    log_file: "/var/log/vllm_my_model.log"
    systemd_unit: "vllm-my-model.service"
    start_command: ["systemctl", "start", "vllm-my-model.service"]
    stop_command: ["systemctl", "stop", "vllm-my-model.service"]
    # Detection
    model_detect_pattern: "(?i)mymodel"
    process_patterns: ["vllm serve", "VLLM::EngineCore", "VLLM::Worker_TP"]
    process_exclude_patterns: []
    startup_time_seconds: 900
    stop_timeout_seconds: 60
    log_filter: default

  # LLM Engine — shared port with other llama/ik_llama instances
  llama_my_model:
    name: "MyModel Q8_0 (llama.cpp)"
    backend: "llama.cpp"
    role: "llm"
    exclusive_group: "llm_8030"       # shared port — mutual exclusion
    base_url: "http://127.0.0.1:8030"
    health_endpoint: "/health"
    models_endpoint: "/v1/models"
    timeout_seconds: 2
    log_file: "/var/log/llama_my_model.log"
    systemd_unit: "llama-my-model.service"
    start_command: ["systemctl", "start", "llama-my-model.service"]
    stop_command: ["systemctl", "stop", "llama-my-model.service"]
    model_detect_pattern: "(?i)mymodel"
    process_patterns: ["llama-server", "my_model"]
    process_exclude_patterns: ["ik_llama"]
    startup_time_seconds: 90
    stop_timeout_seconds: 15
    log_filter: default

  # Project — uses LLM API, doesn't load a model
  my_proxy:
    name: "My Proxy"
    backend: "proxy"
    role: "project"
    exclusive_group: ~
    base_url: "http://127.0.0.1:8082"
    health_endpoint: "/health"
    timeout_seconds: 2
    systemd_unit: "my-proxy.service"
    start_command: ["systemctl", "start", "my-proxy.service"]
    stop_command: ["systemctl", "stop", "my-proxy.service"]
    process_patterns: ["my_proxy"]
    startup_time_seconds: 10
    log_filter: default

gpu:
  enable: true

model_detection:
  cache_seconds: 5
  cache_grace_seconds: 30
  process_scan_interval_seconds: 30
  process_keywords: ["llama", "server", "vllm", "python", "sglang"]
  model_arg_flags: ["-m", "--model"]

thresholds:
  vram_warning_percent: 70
  vram_danger_percent: 90
  power_warning_percent: 70
  power_danger_percent: 90

admin:
  enabled: true
  allow_force_stop: true
  csrf_enabled: true
  csrf_header: "X-CSRF-Token"
  # password_hash: "pbkdf2:sha256:..."   # Set via: python change_admin_password.py
  # session_secret: "change-me"

gpu_processes:
  enable: true
  show_command: true
  max_processes: 100

paths:
  load_stats: "llama_load_stats.json"