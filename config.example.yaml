# Example configuration for dashboard-llm.
# Recommended: use /admin/config web UI instead of editing manually.
# See scripts/GUIDE.md for full documentation.

server:
  host: "0.0.0.0"
  port: 5001
  debug: false

monitoring:
  refresh_interval_ms: 1000
  log_lines: 50
  log_block_bytes: 8192

# Each service is defined here with ALL its attributes.
# Use the /admin/config page to add/edit/delete services via web UI.
services:
  # Always-on service — not in LLM Engine dropdown
  ollama:
    name: "Ollama"
    backend: "ollama"
    role: "llm"
    exclusive_group: ~
    base_url: "http://127.0.0.1:11434"
    health_endpoint: "/"
    timeout_seconds: 2
    log_type: "journalctl"
    journalctl_unit: "ollama"
    systemd_unit: "ollama.service"
    process_patterns: ["ollama"]
    startup_time_seconds: 5

  # LLM Engine — dedicated port, systemd-managed
  vllm_qwen27b:
    name: "Qwen3.6-27B (vLLM BF16)"
    backend: "vllm"
    role: "llm"
    exclusive_group: ~          # dedicated port — not shared
    base_url: "http://127.0.0.1:8002"
    health_endpoint: "/health"
    models_endpoint: "/v1/models"
    timeout_seconds: 2
    log_file: "/var/log/vllm_qwen36_27b.log"
    systemd_unit: "vllm-qwen27b.service"
    # Metadata (displayed in UI)
    model_family: "Qwen3.6"
    model_size_b: 27
    model_quant: "BF16"
    model_quant_bits: 16.0
    context_size: 131072
    has_thinking: true
    has_tools: true
    has_vision: true
    # Detection
    model_detect_pattern: "(?i)qwen36-27b|qwen3\\.6-27b"
    process_patterns: ["vllm serve", "VLLM::EngineCore", "VLLM::Worker_TP"]
    process_exclude_patterns: []
    startup_time_seconds: 900
    stop_timeout_seconds: 60

  # LLM Engine — shared port 8030 with other llama/ik_llama instances
  llama_qwen27b_heretic:
    name: "Qwen3.6-27B-heretic Q8_0 (llama.cpp)"
    backend: "llama.cpp"
    role: "llm"
    exclusive_group: "llm_8030"       # shared port — mutual exclusion
    base_url: "http://127.0.0.1:8030"
    health_endpoint: "/health"
    models_endpoint: "/v1/models"
    timeout_seconds: 2
    log_file: "/var/log/llama_qwen36_27b_heretic.log"
    systemd_unit: "llama-heretic.service"
    model_family: "Qwen3.6"
    model_size_b: 27
    model_quant: "Q8_0"
    model_quant_bits: 8.7
    context_size: 131072
    has_thinking: true
    has_vision: true
    model_detect_pattern: "(?i)heretic|uncensored"
    process_patterns: ["heretic", "llama-server"]
    process_exclude_patterns: ["ik_llama", "MTP", "MiniMax", "GLM", "Qwen3.6-35B"]
    startup_time_seconds: 90
    stop_timeout_seconds: 15

  # Projet — uses LLM API, doesn't load a model
  claude_code_proxy:
    name: "Claude Code Proxy"
    backend: "proxy"
    role: "project"
    exclusive_group: ~
    base_url: "http://127.0.0.1:8082"
    health_endpoint: "/health"
    timeout_seconds: 2
    systemd_unit: "claude-code-proxy.service"
    process_patterns: ["start_proxy"]
    startup_time_seconds: 10

gpu:
  enable: true

model_detection:
  cache_seconds: 5
  cache_grace_seconds: 30
  process_scan_interval_seconds: 30
  process_keywords: ["llama", "server", "vllm", "python", "sglang"]
  model_arg_flags: ["-m", "--model"]

thresholds:
  vram_warning_percent: 70
  vram_danger_percent: 90
  power_warning_percent: 70
  power_danger_percent: 90

admin:
  enabled: true
  allow_force_stop: true
  csrf_enabled: true
  csrf_header: "X-CSRF-Token"
  # password_hash: "pbkdf2:sha256:..."   # Set via: python change_admin_password.py
  # session_secret: "change-me"

gpu_processes:
  enable: true
  show_command: true
  max_processes: 100

paths:
  load_stats: "llama_load_stats.json"